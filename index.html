<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz World | Mr. Gilang Yudha Tama, S.S</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080812;
      --panel: rgba(16, 18, 35, 0.88);
      --pink: #ff2bd6;
      --cyan: #22f7ff;
      --yellow: #ffe66d;
      --green: #39ff88;
      --purple: #8f4dff;
      --text: #f4f7ff;
      --muted: #a9b0d6;
      --danger: #ff4d6d;
    }

    body {
      min-height: 100vh;
      font-family: "Courier New", monospace;
      background:
        radial-gradient(circle at top left, rgba(255, 43, 214, 0.22), transparent 32%),
        radial-gradient(circle at top right, rgba(34, 247, 255, 0.22), transparent 32%),
        linear-gradient(180deg, #070711 0%, #11142a 50%, #05050c 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 247, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 43, 214, 0.05) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 6px
      );
      pointer-events: none;
      z-index: -1;
      animation: scanline 9s linear infinite;
    }

    @keyframes scanline {
      from { transform: translateY(-40px); }
      to { transform: translateY(40px); }
    }

    .wrapper {
      width: min(1200px, 92%);
      margin: 0 auto;
      padding: 34px 0 60px;
    }

    header {
      border: 3px solid var(--cyan);
      background: rgba(7, 8, 20, 0.76);
      box-shadow:
        0 0 18px rgba(34, 247, 255, 0.55),
        inset 0 0 22px rgba(255, 43, 214, 0.18);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255, 43, 214, 0.14) 45%,
        rgba(34, 247, 255, 0.14) 55%,
        transparent 100%
      );
      transform: translateX(-100%);
      animation: shine 4s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%); }
      45%, 100% { transform: translateX(100%); }
    }

    .badge {
      display: inline-block;
      color: var(--bg);
      background: var(--yellow);
      font-weight: bold;
      padding: 8px 12px;
      margin-bottom: 18px;
      box-shadow: 4px 4px 0 var(--pink);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    h1 {
      font-size: clamp(2.1rem, 6vw, 5.4rem);
      line-height: 0.9;
      text-transform: uppercase;
      color: var(--text);
      text-shadow:
        3px 3px 0 var(--pink),
        -3px -3px 0 var(--cyan),
        0 0 22px rgba(255, 43, 214, 0.8);
      margin-bottom: 18px;
    }

    .subtitle {
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      line-height: 1.7;
    }

    .creator {
      color: var(--green);
      margin-top: 14px;
      font-weight: bold;
      text-shadow: 0 0 12px rgba(57, 255, 136, 0.8);
    }

    .control-panel {
      margin-top: 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .search-box {
      width: 100%;
      background: #090a16;
      border: 2px solid var(--purple);
      color: var(--text);
      padding: 15px 16px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      box-shadow: 0 0 14px rgba(143, 77, 255, 0.45);
    }

    .search-box:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 18px rgba(34, 247, 255, 0.6);
    }

    .status {
      border: 2px solid var(--pink);
      padding: 14px 16px;
      color: var(--yellow);
      background: rgba(255, 43, 214, 0.1);
      white-space: nowrap;
      box-shadow: 0 0 14px rgba(255, 43, 214, 0.35);
      font-weight: bold;
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 26px 0 30px;
    }

    .filter-btn {
      border: 2px solid var(--cyan);
      color: var(--cyan);
      background: #080812;
      padding: 11px 15px;
      font-family: inherit;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.2s;
      box-shadow: 3px 3px 0 rgba(255, 43, 214, 0.7);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--cyan);
      color: #05050c;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 rgba(255, 43, 214, 0.9);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }

    .card {
      position: relative;
      background: var(--panel);
      border: 3px solid rgba(34, 247, 255, 0.78);
      padding: 22px;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow:
        0 0 18px rgba(34, 247, 255, 0.28),
        7px 7px 0 rgba(255, 43, 214, 0.58);
      overflow: hidden;
      transition: 0.25s;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 7px;
      background: linear-gradient(90deg, var(--pink), var(--cyan), var(--yellow), var(--green));
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--yellow);
      box-shadow:
        0 0 22px rgba(255, 230, 109, 0.45),
        10px 10px 0 rgba(34, 247, 255, 0.58);
    }

    .card-top {
      position: relative;
      z-index: 1;
    }

    .icon {
      font-size: 2.4rem;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 8px rgba(255, 43, 214, 0.8));
    }

    .tag {
      display: inline-block;
      font-size: 0.72rem;
      color: #05050c;
      background: var(--green);
      padding: 6px 8px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .card h2 {
      color: var(--text);
      font-size: 1.35rem;
      margin-bottom: 12px;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 rgba(255, 43, 214, 0.8);
    }

    .card p {
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.94rem;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 0;
      color: var(--yellow);
      font-size: 0.82rem;
      font-weight: bold;
    }

    .play-btn {
      display: inline-block;
      text-align: center;
      text-decoration: none;
      color: #05050c;
      background: var(--pink);
      border: 2px solid var(--yellow);
      padding: 13px 16px;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 var(--cyan);
      transition: 0.2s;
    }

    .play-btn:hover {
      background: var(--yellow);
      box-shadow: 6px 6px 0 var(--pink);
      transform: translate(-2px, -2px);
    }

    .empty {
      display: none;
      margin-top: 30px;
      border: 2px dashed var(--danger);
      color: var(--danger);
      padding: 22px;
      text-align: center;
      background: rgba(255, 77, 109, 0.08);
      font-weight: bold;
    }

    footer {
      margin-top: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer span {
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
    }

    @media (max-width: 720px) {
      header {
        padding: 22px;
      }

      .control-panel {
        grid-template-columns: 1fr;
      }

      .status {
        white-space: normal;
      }

      .card {
        min-height: 240px;
      }
    }
  </style>
</head>

<body>

    const quizGrid = document.getElementById("quizGrid");
    const searchInput = document.getElementById("searchInput");
    const quizCount = document.getElementById("quizCount");
    const emptyMessage = document.getElementById("emptyMessage");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let currentFilter = "all";

    function renderQuizzes() {
      const keyword = searchInput.value.toLowerCase().trim();

      const filteredQuizzes = quizzes.filter((quiz) => {
        const matchesFilter = currentFilter === "all" || quiz.category === currentFilter;

        const matchesSearch =
          quiz.title.toLowerCase().includes(keyword) ||
          quiz.category.toLowerCase().includes(keyword) ||
          quiz.description.toLowerCase().includes(keyword) ||
          quiz.difficulty.toLowerCase().includes(keyword);

        return matchesFilter && matchesSearch;
      });

      quizGrid.innerHTML = "";
      quizCount.textContent = filteredQuizzes.length;

      if (filteredQuizzes.length === 0) {
        emptyMessage.style.display = "block";
        return;
      }

      emptyMessage.style.display = "none";

      filteredQuizzes.forEach((quiz) => {
        const card = document.createElement("section");
        card.className = "card";

        card.innerHTML = `
          <div class="card-top">
            <div class="icon">${quiz.icon}</div>
            <span class="tag">${quiz.category}</span>
            <h2>${quiz.title}</h2>
            <p>${quiz.description}</p>
            <div class="meta">
              <span>${quiz.difficulty}</span>
              <span>${quiz.players}</span>
            </div>
          </div>

          <a class="play-btn" href="${quiz.url}">Launch Quiz</a>
        `;

        quizGrid.appendChild(card);
      });
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        filterButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        renderQuizzes();
      });
    });

    searchInput.addEventListener("input", renderQuizzes);
const SFX = (() => {
  let audioCtx;

  function init() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if (!AudioContextClass) return;

    if (!audioCtx) {
      audioCtx = new AudioContextClass();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  }

  function tone(freq, duration = 0.08, type = "square", volume = 0.04, delay = 0) {
    init();

    if (!audioCtx) return;

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now + delay);

    gain.gain.setValueAtTime(0.0001, now + delay);
    gain.gain.exponentialRampToValueAtTime(volume, now + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now + delay);
    osc.stop(now + delay + duration + 0.04);
  }

  function play(name) {
    init();

    switch (name) {
      case "click":
        tone(520, 0.035, "square", 0.025);
        break;

      case "type":
        tone(760, 0.025, "square", 0.015);
        break;

      case "open":
        tone(420, 0.06, "square", 0.035);
        tone(720, 0.08, "square", 0.03, 0.06);
        break;

      case "start":
        tone(220, 0.07, "sawtooth", 0.04);
        tone(440, 0.07, "sawtooth", 0.04, 0.08);
        tone(880, 0.1, "sawtooth", 0.04, 0.16);
        break;

      case "correct":
        tone(523, 0.07, "square", 0.045);
        tone(659, 0.08, "square", 0.045, 0.08);
        tone(784, 0.12, "square", 0.045, 0.17);
        break;

      case "wrong":
        tone(220, 0.12, "sawtooth", 0.045);
        tone(155, 0.18, "sawtooth", 0.045, 0.13);
        break;

      case "win":
        tone(523, 0.08, "square", 0.045);
        tone(659, 0.08, "square", 0.045, 0.09);
        tone(784, 0.08, "square", 0.045, 0.18);
        tone(1046, 0.18, "square", 0.045, 0.28);
        break;

      case "gameover":
        tone(330, 0.12, "sawtooth", 0.04);
        tone(247, 0.14, "sawtooth", 0.04, 0.13);
        tone(165, 0.22, "sawtooth", 0.04, 0.28);
        break;

      case "power":
        tone(880, 0.06, "triangle", 0.04);
        tone(1100, 0.06, "triangle", 0.04, 0.07);
        tone(1320, 0.08, "triangle", 0.04, 0.14);
        break;

      case "skip":
        tone(700, 0.04, "square", 0.035);
        tone(500, 0.04, "square", 0.035, 0.05);
        tone(900, 0.06, "square", 0.035, 0.1);
        break;

      case "switch":
        tone(360, 0.04, "square", 0.025);
        tone(480, 0.04, "square", 0.025, 0.05);
        break;

      case "reset":
        tone(300, 0.06, "triangle", 0.035);
        tone(240, 0.06, "triangle", 0.035, 0.07);
        break;

      case "reveal":
        tone(600, 0.05, "triangle", 0.035);
        tone(900, 0.09, "triangle", 0.035, 0.06);
        break;
    }
  }

  return { init, play };
})();

document.addEventListener("pointerdown", () => {
  SFX.init();
}, { once: true });

document.addEventListener("click", (event) => {
  if (!(event.target instanceof Element)) return;

  const clicked = event.target.closest("button, .play-btn, .back-link");

  if (clicked) {
    SFX.play("click");
  }
});
    renderQuizzes();
    /* ===== RETRO CYBERPUNK BACKSOUND FOR MAIN HUB ===== */

if (!window.CYBER_MUSIC) {
  window.CYBER_MUSIC = (() => {
    let audioCtx;
    let masterGain;
    let delayNode;
    let feedbackGain;
    let filterNode;
    let isPlaying = false;
    let timer = null;
    let step = 0;
    let nextNoteTime = 0;

    const tempo = 112;
    const stepTime = 60 / tempo / 4;

    const bassLine = [
      36, 36, 43, 36,
      34, 34, 41, 34,
      39, 39, 46, 39,
      31, 31, 38, 31
    ];

    const arpLine = [
      60, 67, 72, 79,
      58, 65, 70, 77,
      63, 70, 75, 82,
      55, 62, 67, 74
    ];

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function initAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (!AudioContextClass) return;

      if (!audioCtx) {
        audioCtx = new AudioContextClass();

        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.14;

        filterNode = audioCtx.createBiquadFilter();
        filterNode.type = "lowpass";
        filterNode.frequency.value = 1600;
        filterNode.Q.value = 7;

        delayNode = audioCtx.createDelay();
        delayNode.delayTime.value = 0.22;

        feedbackGain = audioCtx.createGain();
        feedbackGain.gain.value = 0.28;

        delayNode.connect(feedbackGain);
        feedbackGain.connect(delayNode);

        filterNode.connect(delayNode);
        filterNode.connect(masterGain);
        delayNode.connect(masterGain);
        masterGain.connect(audioCtx.destination);
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone(freq, time, duration, type, volume, destination = filterNode) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, time);

      gain.gain.setValueAtTime(0.0001, time);
      gain.gain.exponentialRampToValueAtTime(volume, time + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

      osc.connect(gain);
      gain.connect(destination);

      osc.start(time);
      osc.stop(time + duration + 0.05);
    }

    function playNoise(time, duration, volume) {
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      const noise = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      filter.type = "highpass";
      filter.frequency.value = 6500;

      gain.gain.setValueAtTime(volume, time);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

      noise.buffer = buffer;
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(masterGain);

      noise.start(time);
      noise.stop(time + duration);
    }

    function playKick(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(95, time);
      osc.frequency.exponentialRampToValueAtTime(38, time + 0.12);

      gain.gain.setValueAtTime(0.14, time);
      gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.14);

      osc.connect(gain);
      gain.connect(masterGain);

      osc.start(time);
      osc.stop(time + 0.16);
    }

    function playSnare(time) {
      playNoise(time, 0.08, 0.035);
      playTone(190, time, 0.06, "triangle", 0.035, masterGain);
    }

    function scheduleStep(time) {
      const bassNote = bassLine[step % bassLine.length];
      const arpNote = arpLine[step % arpLine.length];

      if (step % 4 === 0) {
        playKick(time);
      }

      if (step % 8 === 4) {
        playSnare(time);
      }

      if (step % 2 === 0) {
        playTone(midiToFreq(bassNote), time, stepTime * 1.8, "sawtooth", 0.055);
      }

      playTone(midiToFreq(arpNote), time, stepTime * 0.75, "square", 0.025);

      if (step % 2 === 1) {
        playNoise(time, 0.025, 0.018);
      }

      step++;
    }

    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + 0.25) {
        scheduleStep(nextNoteTime);
        nextNoteTime += stepTime;
      }
    }

    function start() {
      initAudio();

      if (!audioCtx || isPlaying) return;

      isPlaying = true;
      step = 0;
      nextNoteTime = audioCtx.currentTime + 0.05;

      timer = setInterval(scheduler, 60);
    }

    function stop() {
      if (!isPlaying) return;

      isPlaying = false;
      clearInterval(timer);
      timer = null;
    }

    function toggle() {
      if (isPlaying) {
        stop();
      } else {
        start();
      }

      updateButton();
    }

    function updateButton() {
      const button = document.getElementById("musicToggleBtn");

      if (!button) return;

      button.textContent = isPlaying ? "Music: ON" : "Music: OFF";
      button.classList.toggle("music-on", isPlaying);
    }

    function createButton() {
      if (document.getElementById("musicToggleBtn")) return;

      const style = document.createElement("style");
      style.textContent = `
        #musicToggleBtn {
          position: fixed;
          right: 18px;
          bottom: 18px;
          z-index: 9999;
          border: 2px solid #22f7ff;
          background: #080812;
          color: #22f7ff;
          padding: 11px 14px;
          font-family: "Courier New", monospace;
          font-weight: bold;
          text-transform: uppercase;
          cursor: pointer;
          box-shadow: 4px 4px 0 #ff2bd6, 0 0 16px rgba(34, 247, 255, 0.45);
        }

        #musicToggleBtn.music-on {
          background: #ffe66d;
          color: #050510;
          border-color: #ff2bd6;
          box-shadow: 4px 4px 0 #22f7ff, 0 0 18px rgba(255, 230, 109, 0.65);
        }

        #musicToggleBtn:hover {
          transform: translate(-2px, -2px);
        }
      `;

      document.head.appendChild(style);

      const button = document.createElement("button");
      button.id = "musicToggleBtn";
      button.textContent = "Music: OFF";
      button.addEventListener("click", toggle);

      document.body.appendChild(button);
    }

    document.addEventListener("DOMContentLoaded", createButton);
    createButton();

    return { start, stop, toggle };
  })();
}
  </script>
</body>
